<div class="container">
  <div class="form-header">
    <h2>Add New Vehicle</h2>
    <button class="btn btn-secondary" (click)="goBack()">← Back to Dashboard</button>
  </div>

  <div class="card">
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="submitVehicle()">
      <div class="form-row">
        <div class="form-group">
          <label for="vehicleNumber" class="form-label">Vehicle Number *</label>
          <input 
            type="text" 
            id="vehicleNumber" 
            class="form-control" 
            [(ngModel)]="vehicleData.vehicleNumber" 
            name="vehicleNumber" 
            required
            placeholder="e.g., MH-12-AB-1234">
        </div>
        
        <div class="form-group">
          <label for="carModel" class="form-label">Car Model *</label>
          <input 
            type="text" 
            id="carModel" 
            class="form-control" 
            [(ngModel)]="vehicleData.carModel" 
            name="carModel" 
            required
            placeholder="e.g., Toyota Camry">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="rentPerHour" class="form-label">Rent per Hour ($) *</label>
          <input 
            type="number" 
            id="rentPerHour" 
            class="form-control" 
            [(ngModel)]="vehicleData.rentPerHour" 
            name="rentPerHour" 
            required
            min="1"
            step="0.01"
            placeholder="e.g., 25">
        </div>
        
        <div class="form-group">
          <label for="ownerName" class="form-label">Owner Name *</label>
          <input 
            type="text" 
            id="ownerName" 
            class="form-control" 
            [(ngModel)]="vehicleData.ownerName" 
            name="ownerName" 
            required
            placeholder="Enter owner name">
        </div>
      </div>

      <div class="form-group">
        <label for="bankAccountNumber" class="form-label">Bank Account Number *</label>
        <input 
          type="text" 
          id="bankAccountNumber" 
          class="form-control" 
          [(ngModel)]="vehicleData.bankAccountNumber" 
          name="bankAccountNumber" 
          required
          placeholder="Enter bank account number">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="vehicleFrontImage" class="form-label">Vehicle Front Image *</label>
          <input 
            type="file" 
            id="vehicleFrontImage" 
            class="form-control" 
            (change)="onFileSelect($event, 'vehicleFrontImage')" 
            accept="image/*"
            required>
          <small class="form-help">Upload a clear front photo of your vehicle</small>
        </div>
        
        <div class="form-group">
          <label for="aadharCardImage" class="form-label">Aadhar Card Image *</label>
          <input 
            type="file" 
            id="aadharCardImage" 
            class="form-control" 
            (change)="onFileSelect($event, 'aadharCardImage')" 
            accept="image/*"
            required>
          <small class="form-help">Upload your Aadhar card for verification</small>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Adding Vehicle...' : 'Add Vehicle' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="goBack()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
